name: fonika_translate
description: >-
  Multilingual translation, TTS and ASR for Flutter — African languages
  (Fon, Yoruba, Hausa, Adja, Bariba) + 100 world languages. Offline-first
  with local translations support and automatic language detection.
version: 0.0.1
homepage: https://229langues.bj
repository: https://github.com/Ronaldo-F-dev/fonika_translate
issue_tracker: https://github.com/Ronaldo-F-dev/fonika_translate/issues

topics:
  - translation
  - localization
  - tts
  - speech-recognition
  - african-languages

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.10.0'

dependencies:
  flutter:
    sdk: flutter
  http: ^1.2.0
  mime: ^1.0.5
  flutter_tts: ^4.0.0
  speech_to_text: ^7.0.0
  audioplayers: ^6.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
